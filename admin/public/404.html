<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - 页面不存在</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .content { text-align: center; }
    .code { font-size: 120px; font-weight: bold; color: #ddd; line-height: 1; }
    .text { font-size: 24px; color: #333; margin: 20px 0 10px; }
    .desc { font-size: 14px; color: #999; margin: 0 0 40px; }
    .btn {
      padding: 12px 40px;
      background: #333;
      color: #fff;
      text-decoration: none;
      border-radius: 4px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="content">
    <div class="code">404</div>
    <p class="text">页面不存在</p>
    <p class="desc">您访问的页面可能已移除或暂时无法访问</p>
    <a href="/" class="btn">返回首页</a>
  </div>
</body>
</html>
